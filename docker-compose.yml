services:
  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-dev}
      BACKEND_PORT: ${BACKEND_PORT:-8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      FFMPEG_BINARY: ${FFMPEG_BINARY:-ffmpeg}
      EXPORT_FONT_PATHS: ${EXPORT_FONT_PATHS:-/app/Roboto-Regular.ttf}
      EXPORT_TEMP_DIR: ${EXPORT_TEMP_DIR:-}
    ports:
      - "${BACKEND_HOST_PORT:-8085}:${BACKEND_PORT:-8080}"
    restart: unless-stopped
